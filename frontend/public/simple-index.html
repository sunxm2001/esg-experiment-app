<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple ESG Test</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="root">
        <h1>Simple Test Page</h1>
        <button onclick="testApp()">Test App</button>
        <div id="result"></div>
    </div>

    <script>
        async function testApp() {
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = 'Testing...';

            try {
                // Test if we can load the module
                const module = await import('./src/app.js');
                resultDiv.innerHTML = 'Module loaded: ' + (module.App ? 'App class found' : 'No App class');
                console.log('Module:', module);

                if (module.App) {
                    const app = new module.App();
                    resultDiv.innerHTML += '<br>App instance created';
                }
            } catch (err) {
                resultDiv.innerHTML = 'Error: ' + err.message;
                console.error('Import error:', err);
            }
        }

        console.log('Simple page loaded');
    </script>
</body>
</html>
