<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESG Experiment - Narrative Spillover & Investor Behavior</title>
    <link rel="stylesheet" href="/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
      // Error handling
      window.addEventListener('error', function(event) {
        console.error('Global error:', event.error);
        console.error('Error in:', event.filename, 'at line', event.lineno, 'col', event.colno);
        document.getElementById('root').innerHTML = `
          <div style="padding: 20px; font-family: sans-serif;">
            <h2 style="color: #d32f2f;">JavaScript Error</h2>
            <p>Error: ${event.error?.message || 'Unknown error'}</p>
            <p>Check browser console (F12) for details.</p>
            <button onclick="location.reload()">Reload Page</button>
          </div>
        `;
      });

      window.addEventListener('unhandledrejection', function(event) {
        console.error('Unhandled promise rejection:', event.reason);
      });

      // Debug script
      console.log('HTML loaded');
      document.addEventListener('DOMContentLoaded', () => {
        console.log('DOMContentLoaded fired');
      });
      window.addEventListener('load', () => {
        console.log('Window loaded');
      });

      // Module loading timeout detection
      setTimeout(() => {
        const root = document.getElementById('root');
        if (root && root.innerHTML.includes('Loading ESG Experiment App')) {
          console.warn('App still loading after 10 seconds - possible module loading failure');
          root.innerHTML = `
            <div style="padding: 40px; font-family: sans-serif; text-align: center;">
              <h2 style="color: #d32f2f;">Application Loading Failed</h2>
              <p>The ESG Experiment App failed to load after 10 seconds.</p>
              <p>Possible causes:</p>
              <ul style="text-align: left; max-width: 500px; margin: 20px auto;">
                <li>JavaScript modules failed to load</li>
                <li>Check browser console for errors (F12)</li>
                <li>Ensure JavaScript is enabled in your browser</li>
                <li>Try clearing browser cache and reloading</li>
              </ul>
              <button onclick="location.reload()" style="padding: 10px 20px; background: #2E7D32; color: white; border: none; border-radius: 4px; cursor: pointer;">
                Reload Page
              </button>
            </div>
          `;
        }
      }, 10000);
    </script>
    <script type="module" src="./src/index.js"></script>
</head>
<body>
    <div id="root">
        <div class="loading-container">
            <div class="loading-spinner"></div>
            <p>Loading ESG Experiment App...</p>
            <p style="font-size: 14px; color: #666; margin-top: 10px;">If this takes too long, press F12 to open Developer Tools and check for errors.</p>
        </div>
    </div>
</body>
</html>
