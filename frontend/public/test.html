<!DOCTYPE html>
<html>
<head>
    <title>Test Page</title>
</head>
<body>
    <h1>Test JavaScript Loading</h1>
    <div id="output"></div>

    <script>
        document.getElementById('output').innerHTML = 'Basic JavaScript works';
        console.log('Test script loaded');

        // Try to load the module
        try {
            import('./src/index.js').then(module => {
                console.log('Module loaded successfully', module);
                document.getElementById('output').innerHTML += '<br>Module loaded';
            }).catch(err => {
                console.error('Failed to load module:', err);
                document.getElementById('output').innerHTML += '<br>Module load failed: ' + err.message;
            });
        } catch (err) {
            console.error('Import error:', err);
            document.getElementById('output').innerHTML += '<br>Import error: ' + err.message;
        }
    </script>
</body>
</html>
